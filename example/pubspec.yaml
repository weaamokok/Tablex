name: tablex_example
description: Example app for the tablex package.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter
  skeletonizer: ^2.1.3
  tablex:
    path: ../
  file_picker: ^11.0.0
flutter:
  uses-material-design: true
  assets:
    - assets/fonts/Cairo-Regular.ttf
    - assets/fonts/Cairo-Bold.ttf