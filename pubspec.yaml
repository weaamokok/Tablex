name: tablex
description: "A production-grade Flutter data grid with zero dependency on any third-party grid engine."
version: 0.2.0
homepage: https://github.com/weaamokok/tablex
repository: https://github.com/weaamokok/tablex
issue_tracker: https://github.com/weaamokok/tablex/issues

environment:
  sdk: ">=3.1.0 <4.0.0"
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter
  collection: ^1.18.0
  intl: ^0.20.2
  slang: ^4.0.0
  slang_flutter: ^4.0.0
  excel: ^4.0.0
  file_picker: ^8.0.0
  web: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  slang_build_runner: ^4.0.0

flutter:
  uses-material-design: true
